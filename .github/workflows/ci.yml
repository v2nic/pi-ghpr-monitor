name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Run tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm test

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Build extension bundle
        run: npx esbuild src/index.ts --bundle --platform=node --target=node22 --outfile=dist/index.js --external:@mariozechner/pi-ai --external:@mariozechner/pi-tui --external:@mariozechner/pi-agent-core --external:@sinclair/typebox

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Run integration tests with tmux screenshots
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PI_OFFLINE: "1"
        run: |
          cd test/integration
          chmod +x ./run-screenshots.sh
          npx tsx run-screenshots.ts ./screenshots

      - name: Upload screenshots as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tmux-screenshots
          path: test/integration/screenshots/
          retention-days: 30

      - name: Create tmux screenshots check report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '${{ github.workspace }}/test/integration/screenshots/screenshots-report-truncated.md';
            let report = '';
            let conclusion = 'success';
            try {
              report = fs.readFileSync(reportPath, 'utf8');
            } catch {
              report = '⚠️ No screenshot report found. The integration test may have failed before generating it.';
              conclusion = 'failure';
            }
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Tmux Screenshots',
              head_sha: context.sha,
              status: 'completed',
              conclusion: conclusion,
              output: {
                title: 'Tmux Screenshots',
                summary: report,
              },
            });
